<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List (MVC)</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!--
      Page header:
      This container holds the main title and a short subtitle that explains
      what this page represents for the assignment.
    -->
    <header class="app-header">
      <h1 class="app-title">Todo List App</h1>
      <p class="app-subtitle">
        Vanilla JS + HTML + CSS — MVC pattern with dummyjson.com API.
      </p>
    </header>

    <!--
      Main app layout:
      This <main> element contains the input area and the two todo columns.
      The controller code will use the element IDs defined here to locate and
      connect DOM elements to the view layer.
    -->
    <main class="app-main">
      <!--
        Input section:
        Users type a new todo description into the text box and either click
        the "Submit" button or press Enter to add a pending task.
      -->
      <section class="input-section" aria-label="Add new todo">
        <input
          id="new-todo-input"
          class="todo-input"
          type="text"
          placeholder="Type a new task and press Enter or click Submit..."
        />
        <button id="add-todo-button" class="btn btn-primary">
          Submit
        </button>
        <!--
          Feedback messages:
          The view will write short status or error messages into this element
          so the user can see what is happening (for example, API failures).
        -->
        <p id="feedback-message" class="feedback-message" aria-live="polite"></p>
      </section>

      <!--
        Lists container:
        This wrapper holds the two columns that represent the "Pending" and
        "Completed" lists. Each column has its own title and list container.
      -->
      <section class="lists-section">
        <!-- Pending list column -->
        <div class="list-column">
          <h2 class="list-title">Pending Tasks</h2>
          <!--
            The <ul> element here will contain <li> elements generated by the
            view. We use a data attribute so the view can tell which list it is
            and so the controller can attach delegated event listeners to it.
          -->
          <ul
            id="pending-list"
            class="todo-list"
            data-list-type="pending"
          >
            <li class="text-muted">Loading tasks from server...</li>
          </ul>
        </div>

        <!-- Completed list column -->
        <div class="list-column">
          <h2 class="list-title">Completed Tasks</h2>
          <ul
            id="completed-list"
            class="todo-list"
            data-list-type="completed"
          ></ul>
        </div>
      </section>
    </main>

    <!--
      Root script:
      The main.js file wires together the Model, View, and Controller classes.
      We load it as a module so we can use ES module imports between files.
    -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
